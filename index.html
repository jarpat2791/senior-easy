<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Senior-Easy - Aplikacja dla seniorów ułatwiająca kontakt z rodziną i zarządzanie lekami" />
  <title>Senior-Easy App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .rounded-3xl { border-radius: 1.5rem; }
    .rounded-2xl { border-radius: 1rem; }
    body { margin: 0; padding: 0; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-100 to-purple-100 min-h-screen">
  <div id="root" class="p-4 max-w-4xl mx-auto"></div>

  <!-- React Production -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function SeniorEasyApp() {
      const [currentScreen, setCurrentScreen] = useState('home');
      const [medications, setMedications] = useState(JSON.parse(localStorage.getItem('medications')) || [
        { id: 1, name: 'Acard', time: '08:00', taken: false },
        { id: 2, name: 'Metformin', time: '12:00', taken: false },
        { id: 3, name: 'Amlozek', time: '20:00', taken: false }
      ]);
      const [familyContacts, setFamilyContacts] = useState(JSON.parse(localStorage.getItem('familyContacts')) || [
        { id: 1, name: 'Anna (córka)', phone: '+48123456789', avatar: '👩', app: 'whatsapp' },
        { id: 2, name: 'Piotr (syn)', phone: '+48987654321', avatar: '👨', app: 'viber' },
        { id: 3, name: 'Dr. Kowalski', phone: '+48555123456', avatar: '👨‍⚕️', app: '' }
      ]);
      const [localServices, setLocalServices] = useState(JSON.parse(localStorage.getItem('localServices')) || [
        { id: 1, name: 'Transport Medyczny', phone: '800123456', icon: '🚑' },
        { id: 2, name: 'Pomoc Domowa', phone: '800654321', icon: '🏠' },
        { id: 3, name: 'Apteka z Dowozem', phone: '800789012', icon: '💊' }
      ]);
      const [notifications, setNotifications] = useState([]);
      const [careMode, setCareMode] = useState(true);

      const [newMedName, setNewMedName] = useState('');
      const [newMedTime, setNewMedTime] = useState('');

      const [newContactName, setNewContactName] = useState('');
      const [newContactPhone, setNewContactPhone] = useState('');
      const [newContactApp, setNewContactApp] = useState('');

      const [newServiceName, setNewServiceName] = useState('');
      const [newServicePhone, setNewServicePhone] = useState('');
      const [newServiceIcon, setNewServiceIcon] = useState('');

      useEffect(() => { localStorage.setItem('medications', JSON.stringify(medications)); }, [medications]);
      useEffect(() => { localStorage.setItem('familyContacts', JSON.stringify(familyContacts)); }, [familyContacts]);
      useEffect(() => { localStorage.setItem('localServices', JSON.stringify(localServices)); }, [localServices]);

      const addNotification = (text) => {
        const newNotif = { id: Date.now(), text, time: new Date().toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'}), read:false };
        setNotifications(prev => [newNotif, ...prev]);
      };

      const markMedicationTaken = (id) => {
        setMedications(prev => prev.map(med => med.id===id ? {...med, taken:true} : med));
        if(careMode) addNotification('Rodzina została powiadomiona o przyjęciu leku');
      };

      const addMedication = () => {
        if(newMedName && newMedTime){
          setMedications(prev => [...prev, {id:Date.now(), name:newMedName, time:newMedTime, taken:false}]);
          setNewMedName(''); setNewMedTime('');
        }
      };

      const deleteMedication = (id) => setMedications(prev => prev.filter(med=>med.id!==id));

      const makeCall = (contact) => {
        if(contact.phone) window.open(`tel:${contact.phone}`, '_self');
        if(careMode) addNotification(`Połączenie z ${contact.name}`);
      };

      const startVideoCall = (contact) => {
        if(!contact) return;
        const phone = contact.phone.replace(/[^\d+]/g,'');
        if(contact.app==='whatsapp') window.open(`https://wa.me/${phone}`, '_blank');
        else if(contact.app==='viber') window.open(`viber://chat?number=${phone}`, '_blank');
        else alert('Brak zdefiniowanej aplikacji wideo dla tego kontaktu.');
      };

      const addContact = () => {
        if(newContactName && newContactPhone){
          setFamilyContacts(prev => [...prev, {id:Date.now(), name:newContactName, phone:newContactPhone, avatar:'👤', app:newContactApp}]);
          setNewContactName(''); setNewContactPhone(''); setNewContactApp('');
        }
      };

      const addService = () => {
        if(newServiceName && newServicePhone){
          setLocalServices(prev => [...prev, {id:Date.now(), name:newServiceName, phone:newServicePhone, icon:newServiceIcon||'🏢'}]);
          setNewServiceName(''); setNewServicePhone(''); setNewServiceIcon('');
        }
      };

      const clearData = () => {
        if(confirm('Czy na pewno chcesz wyczyścić wszystkie zapisane dane?')){
          localStorage.clear();
          setMedications([]); setFamilyContacts([]); setLocalServices([]); setNotifications([]);
        }
      };

      return (
        <div>
          {/* Nav Bar */}
          <div className="bg-white rounded-3xl shadow-2xl p-4 mb-6 flex justify-between items-center">
            <button onClick={()=>setCurrentScreen('home')} className="bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl"><span className="text-5xl">🏠</span></button>
            <div className="text-3xl font-bold text-gray-800">
              {currentScreen==='home'?'Strona Główna':
               currentScreen==='video'?'Rozmowa Wideo':
               currentScreen==='medications'?'Leki':
               currentScreen==='contacts'?'Rodzina':
               currentScreen==='services'?'Usługi':
               currentScreen==='notifications'?'Powiadomienia':'Ustawienia'}
            </div>
            <button onClick={()=>setCurrentScreen('settings')} className="bg-gray-500 hover:bg-gray-600 text-white p-4 rounded-2xl"><span className="text-5xl">⚙️</span></button>
          </div>

          {/* Main Content */}
          <div className="bg-white rounded-3xl shadow-2xl p-8">

            {/* HOME */}
            {currentScreen==='home' && (
              <div className="space-y-6 text-center">
                <h1 className="text-5xl font-bold text-blue-600 mb-2">Senior-Easy</h1>
                <p className="text-2xl text-gray-600 mb-4">Witaj! Co chcesz zrobić?</p>
                <div className="grid grid-cols-2 gap-6">
				
                  <button onClick={()=>setCurrentScreen('video')} className="bg-green-500 hover:bg-green-600 text-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center space-y-4"><span className="text-5xl">📽</span><span className="text-3xl font-bold">Rozmowa Wideo</span></button>
                  <button onClick={()=>setCurrentScreen('medications')} className="bg-purple-500 hover:bg-purple-600 text-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center space-y-4"><span className="text-5xl">💊</span><span className="text-3xl font-bold">Leki</span></button>
                  <button onClick={()=>setCurrentScreen('contacts')} className="bg-blue-500 hover:bg-blue-600 text-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center space-y-4"><span className="text-5xl">📞</span><span className="text-3xl font-bold">Rodzina</span></button>
                  <button onClick={()=>setCurrentScreen('services')} className="bg-orange-500 hover:bg-orange-600 text-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center space-y-4"><span className="text-5xl">📍</span><span className="text-3xl font-bold">Usługi</span></button>
                </div>
				   
                <button onClick={clearData} className="mt-4 bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl">Wyczyść wszystkie dane</button>
              </div>
            )}

            {/* VIDEO */}
            {currentScreen==='video' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Rozmowa Wideo</h2>
                {familyContacts.map(c=>(
                  <button key={c.id} onClick={()=>startVideoCall(c)} className="w-full bg-white hover:bg-green-50 border-4 border-green-500 p-8 rounded-3xl shadow-xl flex items-center space-x-6 mb-4">
                    <span className="text-6xl">{c.avatar}</span>
                    <div className="flex-1 text-left">
                      <div className="text-3xl font-bold text-gray-800">{c.name}</div>
                      <div className="text-xl text-gray-500">{c.phone}</div>
                      <div className="text-lg text-gray-400">{c.app?`(${c.app})`:''}</div>
                    </div>
                    <span className="text-5xl">📽</span>
                  </button>
                ))}
              </div>
            )}

            {/* MEDICATIONS */}
            {currentScreen==='medications' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Przypomnienia o Lekach</h2>
                {medications.map(med=>(
                  <div key={med.id} className={`bg-white border-4 p-6 rounded-3xl shadow-xl flex items-center justify-between ${med.taken?'border-gray-300 opacity-60':'border-purple-500'}`}>
                    <div className="flex-1">
                      <div className="text-3xl font-bold text-gray-800">{med.name}</div>
                      <div className="text-2xl text-gray-600">Godzina: {med.time}</div>
                    </div>
                    <div className="flex space-x-3">
                      {!med.taken?<button onClick={()=>markMedicationTaken(med.id)} className="bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl">✅</button>:<div className="bg-gray-300 text-white p-4 rounded-2xl">✅</div>}
                      <button onClick={()=>deleteMedication(med.id)} className="bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl">🗑️</button>
                    </div>
                  </div>
                ))}
                <div className="bg-blue-50 border-4 border-blue-300 p-6 rounded-3xl space-y-4">
                  <h3 className="text-2xl font-bold text-center">Dodaj Nowy Lek</h3>
                  <input type="text" placeholder="Nazwa leku" value={newMedName} onChange={e=>setNewMedName(e.target.value)} className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl"/>
                  <input type="time" value={newMedTime} onChange={e=>setNewMedTime(e.target.value)} className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl"/>
                  <button onClick={addMedication} className="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold p-4 rounded-2xl">➕ Dodaj</button>
                </div>
              </div>
            )}

            {/* CONTACTS */}
            {currentScreen==='contacts' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Kontakty Rodzinne</h2>
                {familyContacts.map(c=>(
                  <div key={c.id} className="bg-white border-4 border-blue-500 p-6 rounded-3xl shadow-xl mb-4">
                    <div className="flex items-center space-x-6 mb-4">
                      <span className="text-6xl">{c.avatar}</span>
                      <div className="flex-1">
                        <div className="text-3xl font-bold text-gray-800">{c.name}</div>
                        <div className="text-xl text-gray-500">{c.phone}</div>
                        <div className="text-lg text-gray-400">{c.app?`(${c.app})`:''}</div>
                      </div>
                    </div>
                    <div className="flex space-x-3">
                      <button onClick={()=>makeCall(c)} className="flex-1 bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl flex items-center justify-center">📞 Zadzwoń</button>
                      <button onClick={()=>startVideoCall(c)} className="flex-1 bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl flex items-center justify-center">🎥 Wideo</button>
                    </div>
                  </div>
                ))}
                <div className="bg-blue-50 border-4 border-blue-300 p-6 rounded-3xl space-y-4">
                  <h3 className="text-2xl font-bold text-center">Dodaj Kontakt</h3>
                  <input type="text" placeholder="Imię i nazwisko" value={newContactName} onChange={e=>setNewContactName(e.target.value)} className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl"/>
                  <input type="text" placeholder="Numer telefonu z +48" value={newContactPhone} onChange={e=>setNewContactPhone(e.target.value)} className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl"/>
                  <select value={newContactApp} onChange={e=>setNewContactApp(e.target.value)} className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl">
                    <option value="">Brak aplikacji</option>
                    <option value="whatsapp">WhatsApp</option>
                    <option value="viber">Viber</option>
                  </select>
                  <button onClick={addContact} className="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold p-4 rounded-2xl">➕ Dodaj Kontakt</button>
                </div>
              </div>
            )}

            {/* SERVICES */}
            {currentScreen==='services' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Lokalne Usługi</h2>
                {localServices.map(s=>(
                  <button key={s.id} onClick={()=>makeCall(s)} className="w-full bg-white hover:bg-orange-50 border-4 border-orange-500 p-8 rounded-3xl shadow-xl flex items-center space-x-6 mb-4">
                    <span className="text-6xl">{s.icon}</span>
                    <div className="flex-1 text-left">
                      <div className="text-3xl font-bold text-gray-800">{s.name}</div>
                      <div className="text-xl text-gray-500">{s.phone}</div>
                    </div>
                    <span className="text-5xl">📞</span>
                  </button>
                ))}
                <div className="bg-orange-50 border-4 border-orange-300 p-6 rounded-3xl space-y-4">
                  <h3 className="text-2xl font-bold text-center">Dodaj Usługę</h3>
                  <input type="text" placeholder="Nazwa" value={newServiceName} onChange={e=>setNewServiceName(e.target.value)} className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl"/>
                  <input type="text" placeholder="Telefon" value={newServicePhone} onChange={e=>setNewServicePhone(e.target.value)} className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl"/>
                  <input type="text" placeholder="Emoji/Ikona" value={newServiceIcon} onChange={e=>setNewServiceIcon(e.target.value)} className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl"/>
                  <button onClick={addService} className="w-full bg-orange-500 hover:bg-orange-600 text-white text-2xl font-bold p-4 rounded-2xl">➕ Dodaj Usługę</button>
                </div>
              </div>
            )}

            {/* SETTINGS */}
            {currentScreen==='settings' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Ustawienia</h2>
                <div className="bg-white border-4 border-blue-500 p-8 rounded-3xl shadow-xl">
                  <div className="flex items-center justify-between mb-6">
                    <div>
                      <div className="text-3xl font-bold text-gray-800">Tryb Opieki Rodzinnej</div>
                      <div className="text-xl text-gray-600 mt-2">Rodzina otrzymuje powiadomienia</div>
                    </div>
                    <button onClick={()=>setCareMode(!careMode)} className={`w-32 h-16 rounded-full transition-all ${careMode?'bg-green-500':'bg-gray-300'} relative`}>
                      <div className={`w-12 h-12 bg-white rounded-full absolute top-2 transition-all ${careMode?'left-16':'left-2'}`}></div>
                    </button>
                  </div>
                  <div className="text-xl text-gray-600 bg-blue-50 p-4 rounded-2xl">{careMode?'✓ Tryb aktywny - rodzina jest informowana':'✗ Tryb wyłączony'}</div>
                </div>
              </div>
            )}

          </div>

          {/* Footer */}
          <div className="text-center mt-6 text-gray-600 text-xl">
            <p>Senior-Easy © 2025 | Pomoc: 800 800 800</p>
          </div>
        </div>
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SeniorEasyApp />);
  </script>
</body>
</html>
