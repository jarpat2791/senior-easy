<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Senior-Easy - Aplikacja dla seniorów ułatwiająca kontakt z rodziną i zarządzanie lekami" />
  <title>Senior-Easy App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .rounded-3xl { border-radius: 1.5rem; }
    .rounded-2xl { border-radius: 1rem; }
    body { margin: 0; padding: 0; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-100 to-purple-100 min-h-screen">
  <div id="root" class="p-4 max-w-4xl mx-auto"></div>

  <!-- React Production -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function SeniorEasyApp() {
      const [currentScreen, setCurrentScreen] = useState('home');
      const [medications, setMedications] = useState([
        { id: 1, name: 'Acard', time: '08:00', taken: false },
        { id: 2, name: 'Metformin', time: '12:00', taken: false },
        { id: 3, name: 'Amlozek', time: '20:00', taken: false }
      ]);
      const [familyContacts] = useState([
        { id: 1, name: 'Anna (córka)', phone: '+48 123 456 789', avatar: '👩' },
        { id: 2, name: 'Piotr (syn)', phone: '+48 987 654 321', avatar: '👨' },
        { id: 3, name: 'Dr. Kowalski', phone: '+48 555 123 456', avatar: '👨‍⚕️' }
      ]);
      const [localServices] = useState([
        { id: 1, name: 'Transport Medyczny', phone: '800 123 456', icon: '🚑' },
        { id: 2, name: 'Pomoc Domowa', phone: '800 654 321', icon: '🏠' },
        { id: 3, name: 'Apteka z Dowozem', phone: '800 789 012', icon: '💊' }
      ]);
      const [notifications, setNotifications] = useState([
        { id: 1, text: 'Czas na leki o 12:00', time: '11:55', read: false },
        { id: 2, text: 'Anna dzwoniła 2 razy', time: '10:30', read: false }
      ]);
      const [careMode, setCareMode] = useState(true);
      const [newMedName, setNewMedName] = useState('');
      const [newMedTime, setNewMedTime] = useState('');

      const addNotification = (text) => {
        const newNotif = {
          id: Date.now(),
          text,
          time: new Date().toLocaleTimeString('pl-PL', {hour: '2-digit', minute: '2-digit'}),
          read: false
        };
        setNotifications(prev => [newNotif, ...prev]);
      };

      const markMedicationTaken = (id) => {
        setMedications(prev => prev.map(med => med.id === id ? { ...med, taken: true } : med));
        if (careMode) {
          addNotification('Rodzina została powiadomiona o przyjęciu leku');
        }
      };

      const addMedication = () => {
        if (newMedName && newMedTime) {
          const newMed = { id: Date.now(), name: newMedName, time: newMedTime, taken: false };
          setMedications(prev => [...prev, newMed]);
          setNewMedName('');
          setNewMedTime('');
        }
      };

      const deleteMedication = (id) => {
        setMedications(prev => prev.filter(med => med.id !== id));
      };

      const makeCall = (contact) => {
        alert(`Dzwonienie do ${contact.name}...\n${contact.phone}`);
        if (careMode) addNotification(`Połączenie z ${contact.name}`);
      };

      const startVideoCall = (contact) => {
        alert(`Rozpoczęcie rozmowy wideo z ${contact.name}...`);
      };

      return (
        <div>
          {/* Navigation Bar */}
          <div className="bg-white rounded-3xl shadow-2xl p-4 mb-6 flex justify-between items-center">
            <button 
              onClick={() => setCurrentScreen('home')} 
              className="bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl transition-colors"
            >
              <span className="text-2xl">🏠</span>
            </button>

            <div className="text-3xl font-bold text-gray-800">
              {currentScreen === 'home' && 'Strona Główna'}
              {currentScreen === 'video' && 'Rozmowa Wideo'}
              {currentScreen === 'medications' && 'Leki'}
              {currentScreen === 'contacts' && 'Rodzina'}
              {currentScreen === 'services' && 'Usługi'}
              {currentScreen === 'notifications' && 'Powiadomienia'}
              {currentScreen === 'settings' && 'Ustawienia'}
            </div>

            <button 
              onClick={() => setCurrentScreen('settings')} 
              className="bg-gray-500 hover:bg-gray-600 text-white p-4 rounded-2xl transition-colors"
            >
              <span className="text-2xl">⚙️</span>
            </button>
          </div>

          {/* Main Content */}
          <div className="bg-white rounded-3xl shadow-2xl p-8">
            {/* HOME SCREEN */}
            {currentScreen === 'home' && (
              <div className="space-y-6">
                <div className="text-center mb-8">
                  <h1 className="text-5xl font-bold text-blue-600 mb-2">Senior-Easy</h1>
                  <p className="text-2xl text-gray-600">Witaj! Co chcesz zrobić?</p>
                </div>

                <div className="grid grid-cols-2 gap-6">
                  <button 
                    onClick={() => setCurrentScreen('video')} 
                    className="bg-green-500 hover:bg-green-600 text-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center space-y-4 transform transition-transform hover:scale-105"
                  >
                    <div className="text-7xl">🎥</div>
                    <span className="text-3xl font-bold">Rozmowa Wideo</span>
                  </button>

                  <button 
                    onClick={() => setCurrentScreen('medications')} 
                    className="bg-purple-500 hover:bg-purple-600 text-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center space-y-4 transform transition-transform hover:scale-105"
                  >
                    <div className="text-7xl">💊</div>
                    <span className="text-3xl font-bold">Leki</span>
                  </button>

                  <button 
                    onClick={() => setCurrentScreen('contacts')} 
                    className="bg-blue-500 hover:bg-blue-600 text-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center space-y-4 transform transition-transform hover:scale-105"
                  >
                    <div className="text-7xl">📞</div>
                    <span className="text-3xl font-bold">Rodzina</span>
                  </button>

                  <button 
                    onClick={() => setCurrentScreen('services')} 
                    className="bg-orange-500 hover:bg-orange-600 text-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center space-y-4 transform transition-transform hover:scale-105"
                  >
                    <div className="text-7xl">📍</div>
                    <span className="text-3xl font-bold">Usługi</span>
                  </button>
                </div>

                {notifications.filter(n => !n.read).length > 0 && (
                  <button 
                    onClick={() => setCurrentScreen('notifications')} 
                    className="w-full bg-red-500 hover:bg-red-600 text-white p-6 rounded-3xl shadow-2xl flex items-center justify-between"
                  >
                    <div className="flex items-center space-x-4">
                      <div className="text-4xl">🔔</div>
                      <span className="text-2xl font-bold">Powiadomienia</span>
                    </div>
                    <span className="bg-white text-red-500 text-2xl font-bold w-14 h-14 rounded-full flex items-center justify-center">
                      {notifications.filter(n => !n.read).length}
                    </span>
                  </button>
                )}
              </div>
            )}

            {/* VIDEO CALL SCREEN */}
            {currentScreen === 'video' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Rozmowa Wideo</h2>
                <div className="space-y-4">
                  {familyContacts.map(contact => (
                    <button 
                      key={contact.id} 
                      onClick={() => startVideoCall(contact)} 
                      className="w-full bg-white hover:bg-green-50 border-4 border-green-500 p-8 rounded-3xl shadow-xl flex items-center space-x-6"
                    >
                      <span className="text-6xl">{contact.avatar}</span>
                      <div className="flex-1 text-left">
                        <div className="text-3xl font-bold text-gray-800">{contact.name}</div>
                        <div className="text-xl text-gray-500">{contact.phone}</div>
                      </div>
                      <div className="text-5xl">🎥</div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* MEDICATIONS SCREEN */}
            {currentScreen === 'medications' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Przypomnienia o Lekach</h2>

                <div className="space-y-4">
                  {medications.map(med => (
                    <div 
                      key={med.id} 
                      className={`bg-white border-4 p-6 rounded-3xl shadow-xl flex items-center justify-between ${med.taken ? 'border-gray-300 opacity-60' : 'border-purple-500'}`}
                    >
                      <div className="flex-1">
                        <div className="text-3xl font-bold text-gray-800">{med.name}</div>
                        <div className="text-2xl text-gray-600">Godzina: {med.time}</div>
                      </div>

                      <div className="flex space-x-3">
                        {!med.taken ? (
                          <button 
                            onClick={() => markMedicationTaken(med.id)} 
                            className="bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl"
                          >
                            <span className="text-2xl">✅</span>
                          </button>
                        ) : (
                          <div className="bg-gray-300 text-white p-4 rounded-2xl">
                            <span className="text-2xl">✅</span>
                          </div>
                        )}

                        <button 
                          onClick={() => deleteMedication(med.id)} 
                          className="bg-red-500 hover:bg-red-600 text-white p-4 rounded-2xl"
                        >
                          <span className="text-2xl">🗑️</span>
                        </button>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="bg-blue-50 border-4 border-blue-300 p-6 rounded-3xl space-y-4">
                  <h3 className="text-2xl font-bold text-center">Dodaj Nowy Lek</h3>
                  <input 
                    type="text" 
                    placeholder="Nazwa leku" 
                    value={newMedName} 
                    onChange={(e) => setNewMedName(e.target.value)} 
                    className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl" 
                  />
                  <input 
                    type="time" 
                    value={newMedTime} 
                    onChange={(e) => setNewMedTime(e.target.value)} 
                    className="w-full text-2xl p-4 border-2 border-gray-300 rounded-2xl" 
                  />
                  <button 
                    onClick={addMedication} 
                    className="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold p-4 rounded-2xl flex items-center justify-center space-x-3"
                  >
                    <span className="text-2xl">➕</span>
                    <span>Dodaj</span>
                  </button>
                </div>
              </div>
            )}

            {/* CONTACTS SCREEN */}
            {currentScreen === 'contacts' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Kontakty Rodzinne</h2>
                <div className="space-y-4">
                  {familyContacts.map(contact => (
                    <div key={contact.id} className="bg-white border-4 border-blue-500 p-6 rounded-3xl shadow-xl">
                      <div className="flex items-center space-x-6 mb-4">
                        <span className="text-6xl">{contact.avatar}</span>
                        <div className="flex-1">
                          <div className="text-3xl font-bold text-gray-800">{contact.name}</div>
                          <div className="text-xl text-gray-500">{contact.phone}</div>
                        </div>
                      </div>

                      <div className="flex space-x-3">
                        <button 
                          onClick={() => makeCall(contact)} 
                          className="flex-1 bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl flex items-center justify-center space-x-2"
                        >
                          <span className="text-2xl">📞</span>
                          <span className="text-2xl font-bold">Zadzwoń</span>
                        </button>

                        <button 
                          onClick={() => startVideoCall(contact)} 
                          className="flex-1 bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl flex items-center justify-center space-x-2"
                        >
                          <span className="text-2xl">🎥</span>
                          <span className="text-2xl font-bold">Wideo</span>
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* SERVICES SCREEN */}
            {currentScreen === 'services' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Lokalne Usługi</h2>
                <div className="space-y-4">
                  {localServices.map(service => (
                    <button 
                      key={service.id} 
                      onClick={() => makeCall({ name: service.name, phone: service.phone })} 
                      className="w-full bg-white hover:bg-orange-50 border-4 border-orange-500 p-8 rounded-3xl shadow-xl flex items-center space-x-6"
                    >
                      <span className="text-6xl">{service.icon}</span>
                      <div className="flex-1 text-left">
                        <div className="text-3xl font-bold text-gray-800">{service.name}</div>
                        <div className="text-xl text-gray-500">{service.phone}</div>
                      </div>
                      <div className="text-5xl">📞</div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* NOTIFICATIONS SCREEN */}
            {currentScreen === 'notifications' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Powiadomienia</h2>
                <div className="space-y-4">
                  {notifications.map(notif => (
                    <div 
                      key={notif.id} 
                      className={`p-6 rounded-3xl shadow-xl ${notif.read ? 'bg-gray-100' : 'bg-yellow-100 border-4 border-yellow-400'}`}
                    >
                      <div className="text-2xl font-bold text-gray-800 mb-2">{notif.text}</div>
                      <div className="text-xl text-gray-500">{notif.time}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* SETTINGS SCREEN */}
            {currentScreen === 'settings' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-8">Ustawienia</h2>

                <div className="bg-white border-4 border-blue-500 p-8 rounded-3xl shadow-xl">
                  <div className="flex items-center justify-between mb-6">
                    <div>
                      <div className="text-3xl font-bold text-gray-800">Tryb Opieki Rodzinnej</div>
                      <div className="text-xl text-gray-600 mt-2">Rodzina otrzymuje powiadomienia</div>
                    </div>

                    <button 
                      onClick={() => setCareMode(!careMode)} 
                      className={`w-32 h-16 rounded-full transition-all ${careMode ? 'bg-green-500' : 'bg-gray-300'} relative`}
                    >
                      <div className={`w-12 h-12 bg-white rounded-full absolute top-2 transition-all ${careMode ? 'left-16' : 'left-2'}`}></div>
                    </button>
                  </div>

                  <div className="text-xl text-gray-600 bg-blue-50 p-4 rounded-2xl">
                    {careMode ? '✓ Tryb aktywny - rodzina jest informowana' : '✗ Tryb wyłączony'}
                  </div>
                </div>

                <div className="bg-gradient-to-r from-purple-500 to-pink-500 text-white p-8 rounded-3xl shadow-xl">
                  <div className="text-3xl font-bold mb-4">Pakiet Premium</div>
                  <div className="text-xl mb-4">
                    • Nieograniczone rozmowy wideo<br/>
                    • Zaawansowane powiadomienia<br/>
                    • Wsparcie techniczne 24/7<br/>
                    • Historia zdrowia
                  </div>
                  <button className="bg-white text-purple-600 text-2xl font-bold px-8 py-4 rounded-2xl hover:bg-gray-100">
                    Wypróbuj za 29 zł/miesiąc
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* Footer */}
          <div className="text-center mt-6 text-gray-600 text-xl">
            <p>Senior-Easy © 2025 | Pomoc: 800 800 800</p>
          </div>
        </div>
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SeniorEasyApp />);
  </script>
</body>
</html>
