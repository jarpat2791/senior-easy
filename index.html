<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Senior-Easy - aplikacja ułatwiająca kontakt z rodziną i zarządzanie lekami" />
  <title>Senior-Easy App — WebRTC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; }
    .rounded-3xl { border-radius: 1.5rem; }
    .rounded-2xl { border-radius: 1rem; }
    .modal-bg { background: rgba(0,0,0,0.5); position: fixed; inset: 0; display:flex; align-items:center; justify-content:center; z-index:50; }
    .modal { width: 100%; max-width: 900px; max-height: 90vh; overflow:auto; background: white; padding: 1rem; border-radius: 1rem; }
    textarea { font-family: monospace; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-100 to-purple-100 min-h-screen">
  <div id="root" class="p-4 max-w-4xl mx-auto"></div>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function SeniorEasyApp() {
      const [currentScreen, setCurrentScreen] = useState('home');

      // --- Leki ---
      const [medications, setMedications] = useState([
        { id: 1, name: 'Acard', time: '08:00', taken: false },
        { id: 2, name: 'Metformin', time: '12:00', taken: false },
      ]);
      const [newMedName, setNewMedName] = useState('');
      const [newMedTime, setNewMedTime] = useState('');
      const addMedication = () => {
        if (newMedName && newMedTime) {
          setMedications(prev => [...prev, { id: Date.now(), name: newMedName, time: newMedTime, taken: false }]);
          setNewMedName(''); setNewMedTime('');
        }
      };
      const deleteMedication = id => setMedications(prev => prev.filter(m => m.id !== id));

      // --- Kontakty (localStorage) ---
      const [familyContacts, setFamilyContacts] = useState([]);
      const [newContactName, setNewContactName] = useState('');
      const [newContactPhone, setNewContactPhone] = useState('');
      const [newContactAvatar, setNewContactAvatar] = useState('👤');
      const [editingContact, setEditingContact] = useState(null);

      // --- Usługi (localStorage) ---
      const [localServices, setLocalServices] = useState([]);
      const [newServiceName, setNewServiceName] = useState('');
      const [newServicePhone, setNewServicePhone] = useState('');
      const [newServiceIcon, setNewServiceIcon] = useState('📍');

      // --- WebRTC modal state ---
      const [callModalOpen, setCallModalOpen] = useState(false);
      const [callContact, setCallContact] = useState(null);

      // WebRTC refs & states
      const pcRef = useRef(null);
      const localStreamRef = useRef(null);
      const [localStreamActive, setLocalStreamActive] = useState(false);
      const localVideoRef = useRef(null);
      const remoteVideoRef = useRef(null);
      const [signalText, setSignalText] = useState(''); // JSON to copy/paste (offer/answer + candidates)
      const [remotePasteText, setRemotePasteText] = useState('');
      const icelistRef = useRef([]); // collected local ICE candidates
      const [connectionState, setConnectionState] = useState('');

      // --- load/save localStorage for contacts & services ---
      useEffect(() => {
        const storedContacts = localStorage.getItem('familyContacts');
        const storedServices = localStorage.getItem('localServices');
        if (storedContacts) setFamilyContacts(JSON.parse(storedContacts));
        else {
          const defaults = [
            { id: 1, name: 'Anna (córka)', phone: '+48 123 456 789', avatar: '👩' },
            { id: 2, name: 'Piotr (syn)', phone: '+48 987 654 321', avatar: '👨' }
          ];
          setFamilyContacts(defaults);
          localStorage.setItem('familyContacts', JSON.stringify(defaults));
        }
        if (storedServices) setLocalServices(JSON.parse(storedServices));
        else {
          const defaults = [
            { id: 1, name: 'Transport Medyczny', phone: '800 123 456', icon: '🚑' },
            { id: 2, name: 'Pomoc Domowa', phone: '800 654 321', icon: '🏠' },
          ];
          setLocalServices(defaults);
          localStorage.setItem('localServices', JSON.stringify(defaults));
        }
      }, []);

      useEffect(() => localStorage.setItem('familyContacts', JSON.stringify(familyContacts)), [familyContacts]);
      useEffect(() => localStorage.setItem('localServices', JSON.stringify(localServices)), [localServices]);

      // CRUD kontakty/usługi
      const addContact = () => {
        if (newContactName && newContactPhone) {
          const newC = { id: Date.now(), name: newContactName, phone: newContactPhone, avatar: newContactAvatar };
          setFamilyContacts(prev => [...prev, newC]);
          setNewContactName(''); setNewContactPhone(''); setNewContactAvatar('👤');
        }
      };
      const saveEditedContact = (id, newPhone) => {
        setFamilyContacts(prev => prev.map(c => c.id === id ? { ...c, phone: newPhone } : c));
        setEditingContact(null);
      };
      const deleteContact = id => setFamilyContacts(prev => prev.filter(c => c.id !== id));
      const addService = () => {
        if (newServiceName && newServicePhone) {
          const newS = { id: Date.now(), name: newServiceName, phone: newServicePhone, icon: newServiceIcon };
          setLocalServices(prev => [...prev, newS]);
          setNewServiceName(''); setNewServicePhone(''); setNewServiceIcon('📍');
        }
      };
      const deleteService = id => setLocalServices(prev => prev.filter(s => s.id !== id));

      // Clear all saved data
      const clearData = () => {
        if (confirm('Czy na pewno usunąć wszystkie zapisane kontakty i usługi?')) {
          localStorage.removeItem('familyContacts');
          localStorage.removeItem('localServices');
          setFamilyContacts([]); setLocalServices([]);
          alert('Dane usunięte.');
        }
      };

      // === POPRAWIONA FUNKCJA makeCall ===
      // Próbuje otworzyć tel: (na telefonie powinno wywołać aplikację telefoniczną).
      // Dodatkowo kopiuje numer do schowka i wyświetla informację dla użytkownika.
      const makeCall = async (contact) => {
        if (!contact) { alert('Brak numeru do wybrania'); return; }
        const raw = (typeof contact === 'string') ? contact : (contact.phone || '');
        if (!raw) { alert('Brak numeru telefonu'); return; }

        // Normalizacja — pozostawiamy + i cyfry
        const phoneForTel = raw.replace(/[^\d+]/g, '');

        try {
          // Spróbuj otworzyć tel: (na większości telefonów/softphonów)
          window.location.href = `tel:${phoneForTel}`;

          // Skopiuj numer do schowka — przydatne na desktopie
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(raw);
            alert(`Numer ${raw} skopiowany do schowka.\nJeśli połączenie nie zostało zainicjowane, wklej numer w aplikacji telefonicznej.`);
          } else {
            // Fallback — prompt do ręcznego kopiowania
            prompt('Skopiuj numer i wklej w aplikacji telefonicznej:', raw);
          }
        } catch (err) {
          // Jeśli przeglądarka zablokowała, pokaz prompt jako ostateczność
          console.error(err);
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(raw);
              alert(`Numer ${raw} skopiowany do schowka. Wklej w aplikacji telefonicznej.`);
            } else {
              prompt('Skopiuj numer:', raw);
            }
          } catch (e2) {
            prompt('Skopiuj numer:', raw);
          }
        }
      };

      // --- WebRTC helpers (jak wcześniej) ---
      const ensureLocalStream = async () => {
        if (localStreamRef.current) return localStreamRef.current;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          localStreamRef.current = stream;
          setLocalStreamActive(true);
          if (localVideoRef.current) localVideoRef.current.srcObject = stream;
          return stream;
        } catch (err) {
          alert('Błąd dostępu do kamerki/mikrofonu: ' + err.message);
          throw err;
        }
      };

      const createPeerConnection = () => {
        if (pcRef.current) {
          try { pcRef.current.close(); } catch(e){}
          pcRef.current = null;
          icelistRef.current = [];
        }
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pcRef.current = pc;

        const remoteStream = new MediaStream();
        if (remoteVideoRef.current) remoteVideoRef.current.srcObject = remoteStream;

        pc.ontrack = (ev) => {
          ev.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));
        };

        pc.onicecandidate = (ev) => {
          if (ev.candidate) {
            icelistRef.current.push(ev.candidate);
            updateSignalTextCurrent();
          }
        };

        pc.onconnectionstatechange = () => {
          setConnectionState(pc.connectionState || '');
        };

        return pc;
      };

      const updateSignalTextCurrent = () => {
        const pc = pcRef.current;
        if (!pc || !pc.localDescription) return;
        const obj = { sdp: pc.localDescription, candidates: icelistRef.current };
        setSignalText(JSON.stringify(obj, null, 2));
      };

      const createOffer = async () => {
        try {
          const stream = await ensureLocalStream();
          const pc = createPeerConnection();
          stream.getTracks().forEach(track => pc.addTrack(track, stream));
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          setTimeout(updateSignalTextCurrent, 500);
        } catch (err) {
          console.error(err);
          alert('Błąd createOffer: ' + err.message);
        }
      };

      const createAnswerFromOffer = async () => {
        try {
          if (!remotePasteText) { alert('Wklej najpierw ofertę (offer JSON) do pola "Wklej ofertę".'); return; }
          const offerObj = JSON.parse(remotePasteText);
          const stream = await ensureLocalStream();
          const pc = createPeerConnection();
          stream.getTracks().forEach(track => pc.addTrack(track, stream));
          await pc.setRemoteDescription(new RTCSessionDescription(offerObj.sdp));
          if (offerObj.candidates && Array.isArray(offerObj.candidates)) {
            for (const c of offerObj.candidates) {
              try { await pc.addIceCandidate(c); } catch(e){}
            }
          }
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          setTimeout(updateSignalTextCurrent, 500);
        } catch (err) {
          console.error(err);
          alert('Błąd createAnswer: ' + (err.message || err));
        }
      };

      const setRemoteAnswerFromPaste = async () => {
        try {
          if (!remotePasteText) { alert('Wklej odpowiedź (answer JSON) w pole "Wklej odpowiedź".'); return; }
          const answerObj = JSON.parse(remotePasteText);
          const pc = pcRef.current;
          if (!pc) { alert('Brak utworzonego PeerConnection. Najpierw utwórz ofertę.'); return; }
          await pc.setRemoteDescription(new RTCSessionDescription(answerObj.sdp));
          if (answerObj.candidates && Array.isArray(answerObj.candidates)) {
            for (const c of answerObj.candidates) {
              try { await pc.addIceCandidate(c); } catch(e){}
            }
          }
        } catch (err) {
          console.error(err);
          alert('Błąd setRemoteAnswer: ' + (err.message || err));
        }
      };

      const handlePasteSignal = (text) => { setRemotePasteText(text); };

      const openCallModal = (contact) => {
        setCallContact(contact);
        setSignalText('');
        setRemotePasteText('');
        setCallModalOpen(true);
      };

      const closeCallModal = () => {
        if (pcRef.current) { try { pcRef.current.close(); } catch(e){} pcRef.current = null; }
        if (localStreamRef.current) { localStreamRef.current.getTracks().forEach(t => t.stop()); localStreamRef.current = null; }
        setLocalStreamActive(false);
        setCallModalOpen(false);
        setConnectionState('');
        setSignalText(''); setRemotePasteText(''); icelistRef.current = [];
        if (localVideoRef.current) localVideoRef.current.srcObject = null;
        if (remoteVideoRef.current) remoteVideoRef.current.srcObject = null;
      };

      const copyToClipboard = async (text) => {
        try { await navigator.clipboard.writeText(text); alert('Skopiowano do schowka.'); }
        catch { prompt('Skopiuj ręcznie poniższy tekst:', text); }
      };

      const startVideoCallFromContact = (contact) => {
        openCallModal(contact);
      };

      return (
        <div>
          {/* Nav */}
          <div className="bg-white rounded-3xl shadow-2xl p-4 mb-6 flex justify-between items-center">
            <button onClick={() => setCurrentScreen('home')} className="bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl">🏠</button>
            <div className="text-3xl font-bold text-gray-800">
              {currentScreen === 'home' && 'Strona Główna'}
              {currentScreen === 'medications' && 'Leki'}
              {currentScreen === 'contacts' && 'Rodzina'}
              {currentScreen === 'services' && 'Usługi'}
              {currentScreen === 'settings' && 'Ustawienia'}
            </div>
            <div className="flex items-center space-x-3">
              <button onClick={() => setCurrentScreen('settings')} className="bg-gray-500 text-white p-4 rounded-2xl">⚙️</button>
            </div>
          </div>

          {/* Main container */}
          <div className="bg-white rounded-3xl shadow-2xl p-8">
            {/* Home */}
            {currentScreen === 'home' && (
              <div className="grid grid-cols-2 gap-6">
                <button onClick={() => setCurrentScreen('contacts')} className="bg-blue-500 text-white p-8 rounded-3xl text-3xl">📞 Rodzina</button>
                <button onClick={() => setCurrentScreen('medications')} className="bg-purple-500 text-white p-8 rounded-3xl text-3xl">💊 Leki</button>
                <button onClick={() => setCurrentScreen('services')} className="bg-orange-500 text-white p-8 rounded-3xl text-3xl">📍 Usługi</button>
                <button onClick={() => setCurrentScreen('settings')} className="bg-gray-500 text-white p-8 rounded-3xl text-3xl">⚙️ Ustawienia</button>
              </div>
            )}

            {/* Medications */}
            {currentScreen === 'medications' && (
              <div className="space-y-4">
                <h2 className="text-4xl font-bold text-center mb-4">Twoje Leki</h2>
                {medications.map(m => (
                  <div key={m.id} className="flex justify-between items-center border-4 border-purple-400 p-4 rounded-3xl">
                    <div>
                      <div className="text-2xl font-bold">{m.name}</div>
                      <div className="text-xl">Godzina: {m.time}</div>
                    </div>
                    <button onClick={() => deleteMedication(m.id)} className="bg-red-500 text-white px-4 py-2 rounded-2xl">🗑️</button>
                  </div>
                ))}
                <div className="border-4 border-blue-300 p-4 rounded-3xl space-y-3">
                  <input className="w-full p-2 border rounded-2xl text-xl" placeholder="Nazwa leku" value={newMedName} onChange={e => setNewMedName(e.target.value)} />
                  <input type="time" className="w-full p-2 border rounded-2xl text-xl" value={newMedTime} onChange={e => setNewMedTime(e.target.value)} />
                  <button onClick={addMedication} className="w-full bg-blue-500 text-white text-2xl rounded-2xl p-2">➕ Dodaj lek</button>
                </div>
              </div>
            )}

            {/* Contacts */}
            {currentScreen === 'contacts' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-4">Kontakty rodzinne</h2>
                {familyContacts.map(c => (
                  <div key={c.id} className="border-4 border-blue-400 p-4 rounded-3xl space-y-2">
                    <div className="flex items-center space-x-4">
                      <span className="text-5xl">{c.avatar}</span>
                      <div className="flex-1">
                        <div className="text-2xl font-bold">{c.name}</div>
                        {editingContact === c.id ? (
                          <input type="text" defaultValue={c.phone}
                            onKeyDown={e => e.key === 'Enter' && saveEditedContact(c.id, e.target.value)}
                            className="w-full p-2 border rounded-2xl text-xl" />
                        ) : (
                          <div className="text-xl text-gray-600">{c.phone}</div>
                        )}
                      </div>
                    </div>
                    <div className="flex space-x-3">
                      <button onClick={() => makeCall(c)} className="flex-1 bg-green-500 text-white text-2xl p-2 rounded-2xl">📞 Zadzwoń</button>
                      <button onClick={() => startVideoCallFromContact(c)} className="bg-indigo-500 text-white text-2xl px-4 py-2 rounded-2xl">📹 Wideo</button>
                      <button onClick={() => setEditingContact(c.id)} className="bg-yellow-400 text-white text-2xl px-4 py-2 rounded-2xl">✏️</button>
                      <button onClick={() => deleteContact(c.id)} className="bg-red-500 text-white text-2xl px-4 py-2 rounded-2xl">🗑️</button>
                    </div>
                  </div>
                ))}
                <div className="border-4 border-blue-300 p-4 rounded-3xl space-y-3">
                  <input className="w-full p-2 border rounded-2xl text-xl" placeholder="Imię i opis" value={newContactName} onChange={e => setNewContactName(e.target.value)} />
                  <input className="w-full p-2 border rounded-2xl text-xl" placeholder="Numer telefonu" value={newContactPhone} onChange={e => setNewContactPhone(e.target.value)} />
                  <input className="w-full p-2 border rounded-2xl text-xl" placeholder="Emoji (np. 👩‍🦳)" value={newContactAvatar} onChange={e => setNewContactAvatar(e.target.value)} />
                  <button onClick={addContact} className="w-full bg-blue-500 text-white text-2xl rounded-2xl p-2">➕ Dodaj kontakt</button>
                </div>
              </div>
            )}

            {/* Services */}
            {currentScreen === 'services' && (
              <div className="space-y-6">
                <h2 className="text-4xl font-bold text-center mb-4">Usługi lokalne</h2>
                {localServices.map(s => (
                  <div key={s.id} className="border-4 border-orange-400 p-4 rounded-3xl flex justify-between items-center">
                    <div className="flex items-center space-x-4">
                      <span className="text-5xl">{s.icon}</span>
                      <div>
                        <div className="text-2xl font-bold">{s.name}</div>
                        <div className="text-xl text-gray-600">{s.phone}</div>
                      </div>
                    </div>
                    <div className="flex space-x-2">
                      <button onClick={() => makeCall(s)} className="bg-green-500 text-white text-2xl px-4 py-2 rounded-2xl">📞</button>
                      <button onClick={() => { setNewServiceName(''); setNewServicePhone(''); setNewServiceIcon('📍'); setCurrentScreen('services'); }} className="bg-gray-300 text-black text-2xl px-4 py-2 rounded-2xl">✏️</button>
                      <button onClick={() => deleteService(s.id)} className="bg-red-500 text-white text-2xl px-4 py-2 rounded-2xl">🗑️</button>
                    </div>
                  </div>
                ))}
                <div className="border-4 border-orange-300 p-4 rounded-3xl space-y-3">
                  <input className="w-full p-2 border rounded-2xl text-xl" placeholder="Nazwa usługi" value={newServiceName} onChange={e => setNewServiceName(e.target.value)} />
                  <input className="w-full p-2 border rounded-2xl text-xl" placeholder="Numer telefonu" value={newServicePhone} onChange={e => setNewServicePhone(e.target.value)} />
                  <input className="w-full p-2 border rounded-2xl text-xl" placeholder="Emoji (np. 🚑)" value={newServiceIcon} onChange={e => setNewServiceIcon(e.target.value)} />
                  <button onClick={addService} className="w-full bg-orange-500 text-white text-2xl rounded-2xl p-2">➕ Dodaj usługę</button>
                </div>
              </div>
            )}

            {/* Settings */}
            {currentScreen === 'settings' && (
              <div className="space-y-6 text-center">
                <h2 className="text-4xl font-bold mb-4">Ustawienia</h2>
                <button onClick={clearData} className="bg-red-600 text-white text-2xl p-4 rounded-2xl w-full">🧹 Wyczyść wszystkie dane</button>
              </div>
            )}
          </div>

          {/* CALL MODAL */}
          {callModalOpen && (
            <div className="modal-bg" onClick={(e) => { if (e.target.classList.contains('modal-bg')) closeCallModal(); }}>
              <div className="modal">
                <div className="flex justify-between items-start">
                  <h3 className="text-2xl font-bold">Połączenie wideo: {callContact?.name || ''}</h3>
                  <div className="flex items-center space-x-2">
                    <div className="text-sm text-gray-600">Stan: {connectionState}</div>
                    <button onClick={closeCallModal} className="bg-red-500 text-white px-3 py-1 rounded-2xl">Zamknij</button>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4 mt-4">
                  <div>
                    <div className="text-lg font-semibold mb-2">Twój podgląd</div>
                    <video ref={localVideoRef} autoPlay muted playsInline style={{width:'100%', borderRadius: '12px', background:'#000'}} />
                    <div className="mt-2">{localStreamActive ? 'Kamera aktywna' : 'Kamera nieaktywna'}</div>
                  </div>
                  <div>
                    <div className="text-lg font-semibold mb-2">Podgląd zdalny</div>
                    <video ref={remoteVideoRef} autoPlay playsInline style={{width:'100%', borderRadius: '12px', background:'#000'}} />
                    <div className="mt-2 text-sm text-gray-600">Jeśli druga osoba zaakceptuje połączenie, zobaczysz jej obraz.</div>
                  </div>
                </div>

                <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <div className="text-lg font-semibold mb-2">Dla dzwoniącego (Caller)</div>
                    <button onClick={createOffer} className="bg-blue-600 text-white px-4 py-2 rounded-2xl mr-2">Utwórz ofertę (Create offer)</button>
                    <div className="mt-3 text-sm text-gray-600">Skopiuj powstały JSON i wyślij do osoby, z którą chcesz rozmawiać.</div>
                    <textarea readOnly rows="6" value={signalText} className="w-full mt-2 p-2 border rounded-2xl text-sm"></textarea>
                    <div className="flex mt-2 space-x-2">
                      <button onClick={() => copyToClipboard(signalText)} className="bg-gray-200 px-3 py-1 rounded-2xl">Kopiuj JSON</button>
                    </div>
                    <div className="mt-3 text-sm text-gray-600">Po otrzymaniu odpowiedzi (answer) od drugiej osoby, wklej ją w pole po prawej (Wklej odpowiedź) i naciśnij "Ustaw odpowiedź".</div>
                  </div>

                  <div>
                    <div className="text-lg font-semibold mb-2">Dla odbiorcy (Callee) / Wklej ofertę</div>
                    <textarea placeholder="Wklej tutaj otrzymany JSON oferty (offer)" value={remotePasteText} onChange={e => handlePasteSignal(e.target.value)} rows="6" className="w-full p-2 border rounded-2xl text-sm"></textarea>
                    <div className="flex mt-2 space-x-2">
                      <button onClick={createAnswerFromOffer} className="bg-green-600 text-white px-4 py-2 rounded-2xl">Utwórz odpowiedź (Create answer)</button>
                      <button onClick={() => { setRemotePasteText(''); }} className="bg-gray-200 px-3 py-1 rounded-2xl">Wyczyść</button>
                    </div>

                    <div className="mt-3 text-sm text-gray-600">Albo, jeśli jesteś dzwoniącym i otrzymałeś odpowiedź od odbiorcy, wklej ją poniżej i naciśnij "Ustaw odpowiedź".</div>
                    <textarea placeholder="Wklej tutaj otrzymaną odpowiedź (answer) i naciśnij 'Ustaw odpowiedź'" rows="4" value={remotePasteText} onChange={e => handlePasteSignal(e.target.value)} className="w-full mt-2 p-2 border rounded-2xl text-sm"></textarea>
                    <div className="flex mt-2 space-x-2">
                      <button onClick={setRemoteAnswerFromPaste} className="bg-indigo-600 text-white px-4 py-2 rounded-2xl">Ustaw odpowiedź (Set remote answer)</button>
                      <button onClick={() => copyToClipboard(signalText)} className="bg-gray-200 px-3 py-1 rounded-2xl">Kopiuj lokalny JSON</button>
                    </div>
                  </div>
                </div>

                <div className="mt-4 text-sm text-gray-600">
                  <strong>Instrukcja (skrót):</strong>
                  <ol className="list-decimal ml-6 mt-2">
                    <li>Osoba A (caller): naciśnij "Utwórz ofertę" → skopiuj JSON → wyślij do osoby B.</li>
                    <li>Osoba B (callee): wklej JSON oferty → naciśnij "Utwórz odpowiedź" → skopiuj odpowiedź → odeślij do osoby A.</li>
                    <li>Osoba A: wklej otrzymaną odpowiedź w pole "Wklej odpowiedź" → naciśnij "Ustaw odpowiedź". Po chwili połączenie powinno się zestawić.</li>
                  </ol>
                  <div className="mt-2 text-red-600">Uwaga: jeśli nie działa natychmiast, daj chwilę na wymianę ICE candidates — JSON automatycznie aktualizuje się o lokalne kandydaty.</div>
                </div>

              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SeniorEasyApp />);
  </script>
</body>
</html>
